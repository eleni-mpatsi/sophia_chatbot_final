version: "3.1"

stories:

- story: happy path
  steps:
  - intent: greet
  - action: utter_greet
  - intent: mood_great
  - action: utter_happy

- story: User asks about location and gas station
  steps:
    - intent: ask_location
    - action: action_ask_location
    - intent: find_gas_station
    - action: utter_find_gas_station
    - action: utter_activation_maps
    - intent: affirm
    - action: utter_get_m
    - intent: silence_above_4
