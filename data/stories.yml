    - intent: deny
    - action: utter_ok

- story: User asks for advice
  steps:
    - intent: question_specific_place
    - action: utter_get_specific_place
    - intent: connection_request
    - action: utter_connection
    - intent: end_call
    - intent: advice_request
    - action: utter_advice
    - intent: parking_info_request
    - action: utter_parking
