version: "3.1"

rules:

- rule: Say goodbye anytime the user says goodbye
  steps:
  - intent: goodbye
  - action: utter_goodbye

- rule: Say 'I am a bot' anytime the user challenges
  steps:
  - intent: bot_challenge
  - action: utter_bot_challenge

- rule: Activate form
  steps:
  - intent: call_request_general
  - action: name_form
  - active_loop: name_form

- rule: Submit form
  condition:
  - active_loop: name_form
  steps:
  - action: name_form
  - active_loop: null
  - slot_was_set:
    - requested_slot: null
  - action: utter_submit
  - action: utter_call_later

- rule: Interruption in name form
  condition:
  # Condition that form is active.
  - active_loop: name_form
  steps:
  # This unhappy path handles the case of an intent `bot_challenge`.
  - intent: bot_challenge
  - action: utter_bot_challenge
  # Return to form after handling the `bot_challenge` intent
  - action: name_form
  - active_loop: name_form

- rule: Activate music form
  steps:
  - intent: change_song
  - action: music_form
  - active_loop: music_form

- rule: Submit music form
  condition:
  - active_loop: music_form
  steps:
  - action: music_form
  - active_loop: null
  - slot_was_set:
    - requested_slot: null
  - action: utter_change_song

- rule: Interruption in music form
  condition:
  # Condition that form is active.
  - active_loop: music_form
  steps:
  # This unhappy path handles the case of an intent `bot_challenge`.
  - intent: bot_challenge
  - action: utter_bot_challenge
  # Return to form after handling the `bot_challenge` intent
  - action: music_form
  - active_loop: music_form
